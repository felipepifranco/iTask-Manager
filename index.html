<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTaks Manager</title>
		<link rel="stylesheet" href="style.css">
		<script src="https://kit.fontawesome.com/2bf1383b42.js" crossorigin="anonymous"></script>
</head>
<body>
<main>
	<div class="criacao-tarefa">
		<div class="criacao-cima">
			<form class="linha-nome">
				<label class="label-criacao" >Nome da Tarefa</label>
				<input type="text" class="input-criacao">
			</form>
		</div>
		<div class="criacao-baixo">
			<form class="tarefa-descricao">
				<label class="label-criacao" >Descrição da Tarefa</label>
				<textarea id="input-descricao" name="description" rows="4">
					
				</textarea>
			</form>
			<form class="data-limite">
				<label class="label-criacao" >Data Limite</label>
				<input type="datetime-local" class="input-criacao">
			</form>
			<button id="adiciona-tarefa">ADD TAREFA</button>
		</div>
	</div>
	<h1>Tarefas</h1>
	<section class="lista-tarefas">
		<div class="card-tarefa">
				<input type="checkbox" class="tarefa-checkbox">
				<div class="tarefa-conteudo">
						<div class="tarefa-titulo">
								<h3>Nome da Tarefa</h3>
								<span class="info">Criado em: 04/07/2026, 23:13:49</span>
						</div>
						<p class="task-description">Descrição da Tarefa</p>
						<div class="task-footer">
								<span>Data Limite: 04/07/2026</span>
						</div>
				</div>
				<i class="fa-solid fa-trash-can"></i>
		</div>							
	</section>
</main>
</body>
</html>
